

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Model Metrics</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    font-family:'Segoe UI';
    min-height:100vh;
}

.metrics-card{
    max-width:700px;
    margin:auto;
    margin-top:80px;
    background:rgba(255,255,255,0.05);
    padding:30px;
    border-radius:20px;
    border:1px solid rgba(255,255,255,0.08);
}

.progress{
    height:10px;
    background:#1f2937;
}

.progress-bar{
    width:0;
    transition:width 1.5s ease;
}

.chart-container{
    margin-top:40px;
}
</style>
</head>
<body>

<div class="metrics-card">

<h4 class="mb-4">📊 Processing Metrics</h4>

<p>Total Files Processed: <strong>{{ metrics.total_files }}</strong></p>
<p>Average Confidence: <strong id="confidenceValue">{{ metrics.avg_confidence }}</strong>%</p>

<div class="mt-3">
    <div class="progress">
        <div class="progress-bar bg-success"
             id="confidenceBar"
             data-value="{{ metrics.avg_confidence }}">
        </div>
    </div>
</div>

<div class="chart-container">

<h5 class="mt-5 mb-3">📈 Confidence Visualization</h5>

<canvas id="confidenceChart"></canvas>

</div>

<div class="mt-4 text-end">
    <a href="{% url 'dashboard' %}" class="btn btn-primary">
        Go to Dashboard →
    </a>
</div>

</div>

<script>

document.addEventListener("DOMContentLoaded", function(){

    const confidenceText = document.getElementById("confidenceValue").innerText;
    const confidence = parseFloat(confidenceText);

    const bar = document.getElementById("confidenceBar");

    setTimeout(function(){
        bar.style.width = confidence + "%";
    },300);

    const canvas = document.getElementById("confidenceChart");

    if(canvas){

        const ctx = canvas.getContext("2d");

        new Chart(ctx,{
            type:"bar",
            data:{
                labels:["Average Confidence"],
                datasets:[{
                    label:"Confidence %",
                    data:[confidence],
                    backgroundColor:"#22c55e"
                }]
            },
            options:{
                responsive:true,
                scales:{
                    y:{
                        beginAtZero:true,
                        max:100
                    }
                }
            }
        });

    }

});

</script>
</body>
</html>
