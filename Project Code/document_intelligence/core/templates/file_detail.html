<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>{{ document.file_name }}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#0f172a,#1e293b);
color:white;
font-family:'Segoe UI';
min-height:100vh;
}

.file-container{
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:12px;
}

.content-box{
background:#020617;
padding:20px;
border-radius:8px;
margin-top:20px;
white-space:pre-wrap;
line-height:1.6;
}

.meta{
margin-top:10px;
font-size:14px;
color:#cbd5f5;
}

</style>
</head>
<body>

<div class="container py-5">

<a href="{% url 'category_view' document.predicted_category %}" class="btn btn-secondary mb-4">
⬅ Back
</a>

<div class="file-container">

<h3>{{ document.file_name }}</h3>

<div class="meta">

Category: <b>{{ document.predicted_category }}</b><br>
Confidence: <b>{{ document.confidence_score }}%</b><br>
Uploaded: {{ document.uploaded_at }}

</div>

<div class="content-box">
{{ document.content }}
</div>

</div>

</div>

</body>
</html>
